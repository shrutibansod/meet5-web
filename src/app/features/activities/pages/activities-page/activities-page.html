<div class="header-row">

    <!-- Left: Title -->
    <div class="header-info">
      <div class="title">Activities</div>
      <div class="sub">Dummy Data</div>
    </div>
  
    <!-- Middle: Search -->
    <div class="header-search">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search activities</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input
          matInput
          placeholder="e.g. brunch, Café Nord, Breiter Weg, Monday…"
          (input)="onSearch($event.target.value)"
        />
      </mat-form-field>
    </div>
  
    <!-- Right: Actions -->
    <div class="header-actions">
         <!-- SORT BUTTON -->
  <button mat-stroked-button type="button" (click)="openSort()">
    <mat-icon>sort</mat-icon>
  </button>

  <!-- FILTER BUTTON -->
  <button mat-stroked-button type="button" (click)="openFilters()">
    <mat-icon>tune</mat-icon>
  </button>
  
  
      <button mat-flat-button color="accent">
        <mat-icon>add</mat-icon>
        Create
      </button>
    </div>
  
  </div>
  
 
  <!-- RESULTS -->
  <div class="page-grid">

    @if (filteredActivities$ | async; as activities) {
  
      @for (activity of activities; track activity.id) {
        <app-activity-card
          [activity]="activity">
        </app-activity-card>
      }
  
      @if (activities.length === 0) {
        <div class="empty">
          No activities match your search.
        </div>
      }
  
    }
  
  </div>
